services:
  ac-defender:
    build: .
    container_name: homeassistant-ac-defender
    restart: unless-stopped
    ports:
      - "8888:8080"
    env_file:
      - .env
    environment:
      ASPNETCORE_URLS: http://+:8080
      TZ: America/Toronto
      Defender__StateFilePath: /data/defender-state.json
      Defender__SettingsRepositoryPath: /data/settings-repo
      Defender__PollIntervalSeconds: 5
    volumes:
      - ./App_Data/defender:/data
      - ./App_Data/auth:/app/App_Data
