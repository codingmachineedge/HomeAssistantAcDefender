<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title }} — AC Defender</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<style>
  :root {
    --bg: #f5f7f8;
    --paper: #ffffff;
    --ink: #111827;
    --sub: #4b5563;
    --muted: #6b7280;
    --line: #d7dde2;
    --line-strong: #b9c2cb;
    --teal: #0f766e;
    --teal-soft: #dff4f0;
    --coral: #b83227;
    --coral-soft: #ffebe5;
    --blue: #2563eb;
    --blue-soft: #e8f0ff;
    --gold: #8a5a13;
    --gold-soft: #fff4d6;
    --shadow: 0 18px 48px rgba(17, 24, 39, .10);
  }

  * { box-sizing: border-box; margin: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.65;
  }
  a { color: var(--teal); }
  a:hover { color: var(--coral); }
  :focus-visible {
    outline: 3px solid #38bdf8;
    outline-offset: 3px;
  }
  .skip-link {
    position: absolute;
    left: 18px;
    top: 12px;
    z-index: 30;
    transform: translateY(-160%);
    border-radius: 8px;
    background: var(--paper);
    color: var(--ink);
    padding: 10px 14px;
    font-weight: 900;
    text-decoration: none;
    box-shadow: var(--shadow);
  }
  .skip-link:focus { transform: translateY(0); }

  .topbar {
    background: rgba(255, 255, 255, .94);
    border-bottom: 1px solid var(--line);
    position: sticky;
    top: 0;
    z-index: 20;
    backdrop-filter: blur(14px);
  }
  .topbar .inner {
    max-width: 1160px;
    margin: 0 auto;
    padding: 12px 24px;
    display: flex;
    align-items: center;
    gap: 18px;
    flex-wrap: wrap;
  }
  .topbar .brand {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 700;
    font-size: 18px;
    color: var(--ink);
    text-decoration: none;
  }
  .topbar nav {
    display: flex;
    gap: 14px;
    flex-wrap: wrap;
    margin-left: auto;
  }
  .topbar nav a {
    color: var(--sub);
    text-decoration: none;
    font-size: 14px;
    font-weight: 700;
  }
  .topbar nav a:hover,
  .topbar nav a.active { color: var(--teal); }

  .langbar {
    display: flex;
    border: 1px solid var(--line);
    border-radius: 8px;
    overflow: hidden;
    background: var(--paper);
  }
  .langbar a {
    padding: 4px 10px;
    font-size: 13px;
    font-weight: 800;
    text-decoration: none;
    color: var(--sub);
  }
  .langbar a + a { border-left: 1px solid var(--line); }
  .langbar a.active { background: var(--teal); color: #fff; }
  .langbar a:hover:not(.active) { color: var(--teal); }

  .doc {
    max-width: 1060px;
    margin: 0 auto;
    padding: 42px 24px 88px;
  }
  .backhome {
    display: inline-block;
    margin-bottom: 28px;
    font-size: 14px;
    font-weight: 800;
    text-decoration: none;
    color: var(--sub);
  }
  .backhome:hover { color: var(--teal); }

  .doc h1,
  .doc h2,
  .doc h3,
  .doc h4 {
    font-family: Georgia, "Times New Roman", serif;
    font-weight: 700;
    line-height: 1.18;
  }
  .doc h1 {
    font-size: clamp(34px, 5vw, 52px);
    margin: 6px 0 22px;
  }
  .doc h2 {
    font-size: clamp(25px, 3.8vw, 34px);
    margin: 42px 0 14px;
    padding-top: 14px;
    border-top: 1px solid var(--line);
  }
  .doc h3 { font-size: 22px; margin: 28px 0 10px; }
  .doc h4 { font-size: 17px; margin: 18px 0 6px; }
  .doc p,
  .doc li { color: #252a32; font-size: 16px; }
  .doc > p,
  .doc > ul,
  .doc > ol,
  .doc > blockquote { max-width: 860px; }
  .doc ul,
  .doc ol { padding-left: 22px; margin: 10px 0; }
  .doc li { margin-bottom: 6px; }
  .doc strong { color: var(--ink); }
  .doc img {
    max-width: 100%;
    height: auto;
    border-radius: 8px;
    border: 1px solid var(--line);
    box-shadow: var(--shadow);
    margin: 20px 0;
  }
  .doc hr { border: none; border-top: 1px solid var(--line); margin: 34px 0; }
  .doc blockquote {
    border-left: 4px solid var(--teal);
    margin: 18px 0;
    padding: 4px 0 4px 18px;
    color: var(--ink);
    font-style: italic;
    font-family: Georgia, serif;
  }
  .doc code {
    background: #eef2f4;
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 1px 6px;
    font-size: 13.5px;
    overflow-wrap: anywhere;
  }
  .doc pre {
    background: #eef2f4;
    border: 1px solid var(--line);
    border-radius: 8px;
    padding: 16px 18px;
    overflow-x: auto;
  }
  .doc pre code { background: none; border: none; padding: 0; }
  .doc table {
    border-collapse: collapse;
    width: 100%;
    margin: 18px 0;
    display: block;
    overflow-x: auto;
  }
  .doc th,
  .doc td {
    border: 1px solid var(--line);
    padding: 9px 12px;
    text-align: left;
    font-size: 14.5px;
  }
  .doc th { background: var(--paper); }

  .article-kicker {
    color: var(--teal);
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }
  .lede {
    color: var(--sub);
    font-size: 18px;
    max-width: 760px;
  }

  .doc-hero,
  .algorithm-article-hero {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(280px, 460px);
    gap: 28px;
    align-items: center;
    margin: 28px 0 34px;
    padding: 28px 0;
    border-top: 1px solid var(--line);
    border-bottom: 1px solid var(--line);
  }
  .doc-hero h2 {
    border: 0;
    margin: 4px 0 10px;
    padding: 0;
  }
  .doc-hero img {
    margin: 0;
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
  }

  .mini-link {
    display: inline-flex;
    align-items: center;
    min-height: 34px;
    padding: 6px 10px;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    color: var(--ink);
    text-decoration: none;
    font-size: 13px;
    font-weight: 800;
    background: var(--paper);
    margin: 4px 8px 4px 0;
  }
  .mini-link:hover { border-color: var(--teal); color: var(--teal); }

  .search-panel,
  .logic-section { margin: 34px 0 46px; }
  .search-panel > label,
  .section-search label {
    display: block;
    color: var(--ink);
    font-weight: 900;
    margin-bottom: 8px;
  }
  .search-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) auto;
    gap: 10px;
    align-items: center;
  }
  .search-row input {
    width: 100%;
    min-height: 44px;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    padding: 10px 12px;
    background: var(--paper);
    color: var(--ink);
    font-size: 15px;
  }
  .search-row input:focus {
    outline: 3px solid rgba(15, 118, 110, .18);
    border-color: var(--teal);
  }
  .search-row button {
    min-height: 44px;
    border: 1px solid var(--line-strong);
    border-radius: 8px;
    padding: 0 14px;
    background: var(--ink);
    color: #fff;
    font-weight: 900;
    cursor: pointer;
  }
  .search-row button:hover { background: var(--teal); }
  [data-search-empty] {
    color: var(--coral);
    font-weight: 800;
    margin-top: 10px;
  }

  .algorithm-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(270px, 1fr));
    gap: 16px;
    margin-top: 22px;
  }
  .compact-grid { grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); }
  .algorithm-card,
  .logic-card {
    --accent: var(--teal);
    --accent-soft: var(--teal-soft);
    background: var(--paper);
    border: 1px solid var(--line);
    border-top: 4px solid var(--accent);
    border-radius: 8px;
    padding: 18px;
    box-shadow: 0 10px 26px rgba(17, 24, 39, .06);
    overflow: hidden;
  }
  .category-core { --accent: var(--teal); --accent-soft: var(--teal-soft); }
  .category-wall { --accent: var(--coral); --accent-soft: var(--coral-soft); }
  .category-sensor { --accent: var(--blue); --accent-soft: var(--blue-soft); }
  .category-system { --accent: var(--gold); --accent-soft: var(--gold-soft); }

  .algorithm-card-top,
  .logic-card-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }
  .algorithm-card h3,
  .logic-card h3 {
    font-size: 21px;
    margin: 13px 0 9px;
  }
  .algorithm-thumb {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--line);
    box-shadow: none !important;
    margin: 0 0 14px !important;
  }
  .article-visual {
    width: 100%;
    aspect-ratio: 16 / 9;
    object-fit: contain;
    background: var(--paper);
  }
  .algorithm-card h3 a { color: var(--ink); text-decoration: none; }
  .algorithm-card h3 a:hover { color: var(--teal); }
  .algorithm-card p,
  .logic-card p { color: var(--sub); }
  .algorithm-card dl {
    display: grid;
    gap: 6px;
    margin: 14px 0;
  }
  .algorithm-card dt {
    color: var(--ink);
    font-size: 12px;
    font-weight: 900;
    text-transform: uppercase;
  }
  .algorithm-card dd {
    color: var(--sub);
    font-size: 14px;
  }
  .settings-preview { font-size: 14px; overflow-wrap: anywhere; }

  .category-pill,
  .live-pill {
    display: inline-flex;
    align-items: center;
    min-height: 24px;
    padding: 3px 8px;
    border-radius: 8px;
    font-size: 12px;
    font-weight: 900;
    white-space: nowrap;
  }
  .category-pill { background: var(--accent-soft); color: var(--accent); }
  .live-pill { background: #eef2f4; color: var(--sub); }

  .logic-section-head {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(280px, 420px);
    gap: 24px;
    align-items: end;
    padding-top: 18px;
    border-top: 1px solid var(--line);
  }
  .logic-section-head h2 {
    border: 0;
    padding: 0;
    margin: 4px 0 8px;
  }
  .logic-list {
    display: grid;
    gap: 18px;
    margin-top: 22px;
  }
  .logic-card-header h3 { margin-top: 8px; }
  .logic-summary {
    color: var(--ink);
    font-weight: 800;
    margin: 14px 0;
  }
  .logic-columns {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
    margin-top: 14px;
  }
  .logic-columns section {
    border-top: 1px solid var(--line);
    padding-top: 10px;
  }
  .logic-columns h4 {
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-size: 13px;
    font-weight: 900;
    text-transform: uppercase;
    color: var(--ink);
    margin: 0 0 6px;
  }
  .logic-columns p { font-size: 14px; }

  .settings-details {
    margin-top: 14px;
    border-top: 1px solid var(--line);
    padding-top: 12px;
  }
  .settings-details summary {
    cursor: pointer;
    color: var(--teal);
    font-weight: 900;
  }
  .settings-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding-left: 0 !important;
  }
  .settings-list li {
    list-style: none;
    margin: 0;
  }

  .motion-stage {
    position: relative;
    min-height: 158px;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    align-items: center;
    gap: 12px;
    margin: 18px 0;
    padding: 18px 6px;
    overflow: hidden;
  }
  .algorithm-article-hero .motion-stage { min-height: 210px; margin: 0; }
  .motion-track {
    position: absolute;
    left: 12%;
    right: 12%;
    height: 4px;
    top: 50%;
    border-radius: 8px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    opacity: .28;
  }
  .motion-track-a { animation: flow-line 2.8s linear infinite; }
  .motion-track-b {
    top: calc(50% + 16px);
    animation: flow-line 3.6s linear infinite reverse;
  }
  .motion-node {
    position: relative;
    z-index: 1;
    min-height: 86px;
    border: 1px solid var(--line);
    border-radius: 8px;
    background: rgba(255, 255, 255, .92);
    display: grid;
    place-items: center;
    text-align: center;
    padding: 10px;
    box-shadow: 0 8px 22px rgba(17, 24, 39, .06);
  }
  .motion-node span {
    display: grid;
    place-items: center;
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    font-weight: 900;
    margin-bottom: 6px;
  }
  .motion-node strong {
    color: var(--ink);
    font-size: 13px;
    text-transform: uppercase;
  }
  .motion-node-decision { animation: pulse-node 2.2s ease-in-out infinite; }
  .thermostat-mini {
    position: absolute;
    z-index: 2;
    left: 50%;
    bottom: 8px;
    width: 58px;
    height: 58px;
    transform: translateX(-50%);
    border: 8px solid var(--accent-soft);
    border-top-color: var(--accent);
    border-radius: 50%;
    background: var(--paper);
    box-shadow: inset 0 0 0 1px var(--line);
    animation: dial-nudge 3.2s ease-in-out infinite;
  }
  .thermostat-mini i {
    position: absolute;
    left: 50%;
    top: 8px;
    width: 3px;
    height: 18px;
    transform: translateX(-50%);
    background: var(--ink);
    border-radius: 8px;
  }

  [data-search-item][hidden] { display: none !important; }

  footer {
    border-top: 1px solid var(--line);
    background: var(--paper);
  }
  footer .inner {
    max-width: 1060px;
    margin: 0 auto;
    padding: 28px 24px 40px;
    color: var(--sub);
    font-size: 13px;
  }
  footer a { color: var(--ink); }

  @keyframes flow-line {
    0% { transform: translateX(-28%); opacity: .12; }
    45% { opacity: .38; }
    100% { transform: translateX(28%); opacity: .12; }
  }
  @keyframes pulse-node {
    0%, 100% { transform: translateY(0); border-color: var(--line); }
    50% { transform: translateY(-3px); border-color: var(--accent); }
  }
  @keyframes dial-nudge {
    0%, 100% { transform: translateX(-50%) rotate(-8deg); }
    50% { transform: translateX(-50%) rotate(24deg); }
  }

  @media (max-width: 860px) {
    .topbar .inner { align-items: flex-start; }
    .topbar nav { width: 100%; margin-left: 0; }
    .doc { padding: 32px 18px 72px; }
    .doc-hero,
    .algorithm-article-hero,
    .logic-section-head { grid-template-columns: 1fr; }
    .logic-columns { grid-template-columns: 1fr; }
  }
  @media (max-width: 560px) {
    .search-row { grid-template-columns: 1fr; }
    .algorithm-grid { grid-template-columns: 1fr; }
    .motion-stage { grid-template-columns: 1fr; min-height: auto; }
    .motion-track,
    .thermostat-mini { display: none; }
    .motion-node { min-height: 64px; }
  }
  @media (prefers-reduced-motion: reduce) {
    *,
    *::before,
    *::after {
      animation-duration: .001ms !important;
      animation-iteration-count: 1 !important;
      scroll-behavior: auto !important;
    }
  }
</style>
</head>
<body>

<a class="skip-link" href="#main-content">Skip to main content</a>

<div class="topbar">
  <div class="inner">
    <a class="brand" href="../index.html">AC Defender</a>
    <nav id="docnav">
      <a href="Website-Tour.html" data-en="Tour" data-yue="導覽">Tour</a>
      <a href="Algorithms.html" data-en="Algorithms" data-yue="算法">Algorithms</a>
      <a href="Every-Guard-Explained.html" data-en="Guards" data-yue="衛兵">Guards</a>
      <a href="Defender-Logic.html" data-en="Logic" data-yue="邏輯">Logic</a>
      <a href="Energy-and-Costs.html" data-en="Energy" data-yue="能源">Energy</a>
      <a href="Settings.html" data-en="Settings" data-yue="設定">Settings</a>
      <a href="API.html" data-en="API" data-yue="API">API</a>
      <a href="Deployment.html" data-en="Deploy" data-yue="部署">Deploy</a>
    </nav>
  </div>
</div>

<main id="main-content" class="doc" tabindex="-1">
  <a class="backhome" href="../index.html">Back to home</a>
  {{ content }}
</main>

<footer>
  <div class="inner">
    AC Defender · watches a real thermostat, tells no lies ·
    <a href="../index.html">Home</a> ·
    <a href="Algorithms.html">Algorithms</a> ·
    <a href="https://github.com/codingmachineedge/HomeAssistantAcDefender">GitHub</a>
  </div>
</footer>

<script>
(function () {
  var current = location.pathname.split("/").pop();
  document.querySelectorAll("#docnav a").forEach(function (a) {
    if (a.getAttribute("href") === current) {
      a.classList.add("active");
      a.setAttribute("aria-current", "page");
    }
  });
})();

(function () {
  function normalize(value) {
    return (value || "").toLowerCase().replace(/\s+/g, " ").trim();
  }

  document.querySelectorAll("[data-search-root]").forEach(function (root) {
    var input = root.querySelector("[data-search-input]");
    if (!input) { return; }

    var items = Array.prototype.slice.call(root.querySelectorAll("[data-search-item]"));
    var count = root.querySelector("[data-search-count]");
    var empty = root.querySelector("[data-search-empty]");
    var clear = root.querySelector("[data-search-clear]");
    if (count && count.parentElement) {
      count.parentElement.setAttribute("role", "status");
      count.parentElement.setAttribute("aria-live", "polite");
      count.parentElement.setAttribute("aria-atomic", "true");
    }

    function update() {
      var query = normalize(input.value);
      var shown = 0;
      items.forEach(function (item) {
        var haystack = normalize(item.getAttribute("data-search-text") || item.textContent);
        var match = !query || haystack.indexOf(query) !== -1;
        item.hidden = !match;
        if (match) { shown += 1; }
      });
      if (count) { count.textContent = shown.toString(); }
      if (empty) { empty.hidden = shown !== 0; }
    }

    input.addEventListener("input", update);
    if (clear) {
      clear.addEventListener("click", function () {
        input.value = "";
        input.focus();
        update();
      });
    }
    update();
  });
})();
</script>

</body>
</html>
