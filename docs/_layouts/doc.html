<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>{{ page.title }} — AC Defender</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<style>
  :root {
    --cream: #F0EEE6;
    --paper: #FAF9F5;
    --ink: #1F1E1D;
    --sub: #6E6A63;
    --clay: #CC785C;
    --clay-dark: #B8603F;
    --line: #E3DFD5;
    --ok: #6A9B72;
  }
  * { box-sizing: border-box; margin: 0; }
  html { scroll-behavior: smooth; }
  body {
    background: var(--cream);
    color: var(--ink);
    font-family: ui-sans-serif, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    line-height: 1.65;
  }
  a { color: var(--clay-dark); }

  /* Top bar */
  .topbar { background: var(--paper); border-bottom: 1px solid var(--line); position: sticky; top: 0; z-index: 10; }
  .topbar .inner { max-width: 1080px; margin: 0 auto; padding: 12px 24px; display: flex; align-items: center; gap: 18px; flex-wrap: wrap; }
  .topbar .brand { font-family: Georgia, "Times New Roman", serif; font-weight: 600; font-size: 18px; color: var(--ink); text-decoration: none; letter-spacing: -0.01em; }
  .topbar nav { display: flex; gap: 16px; flex-wrap: wrap; margin-left: auto; }
  .topbar nav a { color: var(--sub); text-decoration: none; font-size: 14px; font-weight: 600; }
  .topbar nav a:hover, .topbar nav a.active { color: var(--clay-dark); }

  /* Article */
  .doc { max-width: 820px; margin: 0 auto; padding: 40px 24px 80px; }
  .doc .eyebrow { color: var(--clay); text-transform: uppercase; letter-spacing: 0.2em; font-size: 11px; font-weight: 700; }
  .doc h1, .doc h2, .doc h3, .doc h4 { font-family: Georgia, "Times New Roman", serif; font-weight: 500; line-height: 1.2; letter-spacing: -0.01em; }
  .doc h1 { font-size: clamp(30px, 5vw, 44px); margin: 6px 0 22px; }
  .doc h2 { font-size: 26px; margin: 38px 0 12px; padding-top: 10px; border-top: 1px solid var(--line); }
  .doc h3 { font-size: 20px; margin: 26px 0 8px; }
  .doc h4 { font-size: 17px; margin: 20px 0 6px; }
  .doc p, .doc li { color: #33322F; font-size: 16px; }
  .doc ul, .doc ol { padding-left: 22px; margin: 10px 0; }
  .doc li { margin-bottom: 6px; }
  .doc strong { color: var(--ink); }
  .doc img { max-width: 100%; height: auto; border-radius: 12px; border: 1px solid var(--line); box-shadow: 0 14px 40px rgba(31,30,29,.08); margin: 20px 0; }
  .doc hr { border: none; border-top: 1px solid var(--line); margin: 34px 0; }
  .doc blockquote { border-left: 3px solid var(--clay); margin: 18px 0; padding: 4px 0 4px 18px; color: var(--ink); font-style: italic; font-family: Georgia, serif; }
  .doc code { background: var(--paper); border: 1px solid var(--line); border-radius: 6px; padding: 1px 6px; font-size: 13.5px; }
  .doc pre { background: var(--paper); border: 1px solid var(--line); border-radius: 12px; padding: 16px 18px; overflow-x: auto; }
  .doc pre code { background: none; border: none; padding: 0; }
  .doc table { border-collapse: collapse; width: 100%; margin: 18px 0; display: block; overflow-x: auto; }
  .doc th, .doc td { border: 1px solid var(--line); padding: 9px 12px; text-align: left; font-size: 14.5px; }
  .doc th { background: var(--paper); }

  .backhome { display: inline-block; margin-bottom: 26px; font-size: 14px; font-weight: 600; text-decoration: none; color: var(--sub); }
  .backhome:hover { color: var(--clay-dark); }

  /* Language switcher (EN / 粵) */
  .langbar { display: flex; border: 1px solid var(--line); border-radius: 8px; overflow: hidden; }
  .langbar a { padding: 4px 10px; font-size: 13px; font-weight: 700; text-decoration: none; color: var(--sub); }
  .langbar a + a { border-left: 1px solid var(--line); }
  .langbar a.active { background: var(--clay); color: var(--paper); }
  .langbar a:hover:not(.active) { color: var(--clay-dark); }

  footer { border-top: 1px solid var(--line); background: var(--paper); }
  footer .inner { max-width: 820px; margin: 0 auto; padding: 28px 24px 40px; color: var(--sub); font-size: 13px; }
  footer a { color: var(--ink); }
</style>
</head>
<body>

<div class="topbar">
  <div class="inner">
    <a class="brand" href="../index.html">🛡️ AC Defender</a>
    <nav id="docnav">
      <a href="Website-Tour.html" data-en="Tour" data-yue="導覽">Tour</a>
      <a href="Every-Guard-Explained.html" data-en="Guards" data-yue="衛兵">Guards</a>
      <a href="Energy-and-Costs.html" data-en="Energy" data-yue="能源">Energy</a>
      <a href="Defender-Logic.html" data-en="Logic" data-yue="邏輯">Logic</a>
      <a href="Settings.html" data-en="Settings" data-yue="設定">Settings</a>
      <a href="API.html" data-en="API" data-yue="API">API</a>
      <a href="Deployment.html" data-en="Deploy" data-yue="部署">Deploy</a>
    </nav>
    <div class="langbar" role="group" aria-label="Language">
      <a id="lang-en" href="#">EN</a>
      <a id="lang-yue" href="#">粵</a>
    </div>
  </div>
</div>

<article class="doc">
  <a class="backhome" href="../index.html">← Back to home</a>
  {{ content }}
</article>

<footer>
  <div class="inner">
    AC Defender · watches a real thermostat, tells no lies ·
    <a href="../index.html">Home</a> ·
    <a href="https://github.com/codingmachineedge/HomeAssistantAcDefender">GitHub</a>
  </div>
</footer>

<script>
(function () {
  // Every wiki page has an EN version (Foo.html) and a Cantonese sibling (Foo.yue.html).
  // The choice persists per browser and auto-follows across pages.
  var KEY = "acdef-docs-lang";
  var path = location.pathname;
  var isYue = /\.yue\.html$/.test(path) || /\.yue\/?$/.test(path);
  var enHref = isYue ? path.replace(/\.yue(\.html)?$/, "$1").replace(/\.yue\/$/, "/") : path;
  var yueHref = isYue ? path : path.replace(/(\.html)$/, ".yue$1");
  if (!/\.html$/.test(path) && !isYue) { yueHref = path.replace(/\/?$/, ".yue.html"); }

  var en = document.getElementById("lang-en");
  var yue = document.getElementById("lang-yue");
  en.href = enHref; yue.href = yueHref;
  (isYue ? yue : en).classList.add("active");
  en.addEventListener("click", function () { try { localStorage.setItem(KEY, "en"); } catch (e) {} });
  yue.addEventListener("click", function () { try { localStorage.setItem(KEY, "yue"); } catch (e) {} });

  // Keep nav links inside the chosen language.
  if (isYue) {
    document.querySelectorAll("#docnav a").forEach(function (a) {
      a.setAttribute("href", a.getAttribute("href").replace(/(\.html)$/, ".yue$1"));
      if (a.dataset.yue) { a.textContent = a.dataset.yue; }
    });
    document.documentElement.lang = "yue";
  }

  // Auto-follow the saved preference when landing on the other variant.
  try {
    var saved = localStorage.getItem(KEY);
    if (saved === "yue" && !isYue) { location.replace(yueHref); }
    else if (saved === "en" && isYue) { location.replace(enHref); }
  } catch (e) {}
})();
</script>

</body>
</html>
