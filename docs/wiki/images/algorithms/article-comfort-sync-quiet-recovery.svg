<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc"><title id="title">Comfort Sync (quiet recovery) generated algorithm visual</title><desc id="desc">Unique generated explanatory graphic for Comfort Sync (quiet recovery).</desc><style>.font{font-family:Inter,Segoe UI,Arial,sans-serif}.rail{stroke-dasharray:12 18;animation:dash 8s linear infinite}.pulse{animation:pulse 2.8s ease-in-out infinite;transform-origin:center}.orbit{animation:orbit 7s linear infinite;transform-origin:800px 410px}@keyframes dash{to{stroke-dashoffset:-240}}@keyframes pulse{0%,100%{opacity:.82;transform:scale(1)}50%{opacity:1;transform:scale(1.04)}}@keyframes orbit{to{transform:rotate(360deg)}}</style><defs><linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff"/><stop offset=".5" stop-color="#dff4f0"/><stop offset="1" stop-color="hsl(27 80% 96%)"/></linearGradient><filter id="shadow" x="-20%" y="-20%" width="140%" height="140%"><feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#111827" flood-opacity=".14"/></filter></defs><rect width="1600" height="900" fill="url(#bg)"/><circle cx="1370" cy="110" r="190" fill="hsl(65 75% 78%)" opacity=".16"/><circle cx="150" cy="780" r="230" fill="#0f766e" opacity=".09"/><g class="font"><rect x="76" y="72" width="1448" height="756" rx="36" fill="#fff" opacity=".94" filter="url(#shadow)"/><text x="112" y="132" font-size="22" font-weight="850" fill="#0f766e">CORE COOLING / UNIQUE ALGORITHM VISUAL</text><text x="112" y="202" font-size="54" font-weight="850" fill="#111827">Comfort Sync (quiet recovery)</text><text x="112" y="318" font-size="29" font-weight="550" fill="#374151">Spaces out and softens corrections so a fixed</text>
<text x="112" y="356" font-size="29" font-weight="550" fill="#374151">thermostat does not look like an instant robot.</text><g><rect x="1072" y="150" width="416" height="174" rx="22" fill="#dff4f0" stroke="#0f766e"/><text x="1102" y="198" font-size="22" font-weight="850" fill="#0f766e">ARTICLE STATUS</text><text x="1102" y="244" font-size="19" font-weight="800" fill="#374151">8 settings documented in</text>
<text x="1102" y="272" font-size="19" font-weight="800" fill="#374151">article</text><text x="1102" y="304" font-size="18" font-weight="850" fill="#6b7280">Live Defense card</text></g><path class="rail" d="M236 612 C410 510 566 510 720 612 S1030 714 1198 612" fill="none" stroke="#0f766e" stroke-width="8" stroke-linecap="round" opacity=".35"/><circle class="orbit" cx="920" cy="410" r="12" fill="#14b8a6"/><g class="pulse"><circle cx="800" cy="410" r="92" fill="#dff4f0" stroke="#0f766e" stroke-width="8"/><circle cx="800" cy="410" r="54" fill="#fff" stroke="#14b8a6" stroke-width="5"/><path d="M800 363 L842 407 L800 459 L758 407 Z" fill="#0f766e" opacity=".86"/></g><g><rect x="112" y="500" width="390" height="238" rx="22" fill="#f8fafc" stroke="#d7dde2"/><text x="142" y="552" font-size="24" font-weight="850" fill="#0f766e">WATCHES</text><text x="142" y="604" font-size="22" font-weight="560" fill="#374151">Recent wall-touch count, time</text>
<text x="142" y="634" font-size="22" font-weight="560" fill="#374151">since the last defender</text>
<text x="142" y="664" font-size="22" font-weight="560" fill="#374151">command, and how far the room</text>
<text x="142" y="694" font-size="22" font-weight="560" fill="#374151">is above target.</text></g><g><rect x="606" y="520" width="388" height="252" rx="22" fill="#111827"/><text x="638" y="572" font-size="24" font-weight="850" fill="#fff">DECIDES</text><text x="638" y="624" font-size="20" font-weight="560" fill="#d1d5db">After a manual change it</text>
<text x="638" y="652" font-size="20" font-weight="560" fill="#d1d5db">waits a random delay, may</text>
<text x="638" y="680" font-size="20" font-weight="560" fill="#d1d5db">hold one or two extra short</text>
<text x="638" y="708" font-size="20" font-weight="560" fill="#d1d5db">beats, enforces a minimum...</text></g><g><rect x="1098" y="500" width="390" height="238" rx="22" fill="#f8fafc" stroke="#d7dde2"/><text x="1128" y="552" font-size="24" font-weight="850" fill="#0f766e">CHANGES</text><text x="1128" y="604" font-size="22" font-weight="560" fill="#374151">Holds the correction until the</text>
<text x="1128" y="634" font-size="22" font-weight="560" fill="#374151">chosen calm moment, then lets a</text>
<text x="1128" y="664" font-size="22" font-weight="560" fill="#374151">softened nudge through.</text></g><text x="112" y="804" font-size="20" font-weight="800" fill="#6b7280">Real evidence in. Bounded decision in the middle. Real command or real hold out.</text></g></svg>